services:
  casino-livekit:
    image: livekit/livekit-server:latest
    container_name: casino-livekit
    restart: unless-stopped
    command: --config /livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro
